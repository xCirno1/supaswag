server {
    listen 80;
    server_name nutricare.xcirno.dev api.nutricare.xcirno.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name nutricare.xcirno.dev;

    ssl_certificate /etc/letsencrypt/live/xcirno.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xcirno.dev/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://nutricare-frontend:3001;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name api.nutricare.xcirno.dev;

    ssl_certificate /etc/letsencrypt/live/xcirno.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xcirno.dev/privkey.pem;

    location / {
        proxy_pass http://nutricare-backend:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}